name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: python -m ruff check EPG-Janitor tools tests

      # Explicit, named drift gate: freezes the pure matcher primitives against
      # tests/matcher_golden_baseline.json (Stage 0 of the matcher standardization
      # plan). -o addopts="" neutralizes inherited ini options (e.g. --cov) for a
      # clean single-file run with no coverage-threshold interference.
      - name: Matcher golden drift gate
        run: python -m pytest tests/test_matcher_golden.py -q -o addopts=""

      # The vendored shared matching core must byte-compile and stay byte-identical to its
      # pinned hash (catches a stray hand-edit to the vendored copy or a CRLF checkout).
      - name: Vendored-core compile + parity gate
        run: |
          python -m py_compile EPG-Janitor/matching_core.py
          python -m pytest tests/test_core_parity.py -q -o addopts=""

      - name: Run tests with coverage
        run: python -m pytest tests --cov --cov-report=term-missing

      # Guards against backslash-separator release zips (Stream-Mapparr bug-087):
      # validates any committed release zip; no-op when none is checked in.
      - name: Validate committed release zip(s)
        run: |
          shopt -s globstar nullglob
          zips=(**/*.zip)
          if [ ${#zips[@]} -eq 0 ]; then echo "No committed release zip — skipping."; exit 0; fi
          rc=0
          for z in "${zips[@]}"; do
            echo "::group::$z"; python scripts/validate_zip.py "$z" || rc=1; echo "::endgroup::"
          done
          exit $rc
